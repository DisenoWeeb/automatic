<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dra. Bruzera - Editor</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600;700;800&family=Montserrat:wght@500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="./style.css">

  <style>
       *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      font-family: 'DM Sans', 'Montserrat', sans-serif;
      background: #f0edf8;
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background:
        radial-gradient(ellipse 700px 600px at 90% -10%, rgba(196,38,133,.18) 0%, transparent 70%),
        radial-gradient(ellipse 600px 500px at -5% 90%, rgba(54,42,111,.17) 0%, transparent 70%),
        radial-gradient(ellipse 400px 400px at 50% 50%, rgba(196,38,133,.07) 0%, transparent 70%);
      animation: bgShift 20s ease-in-out infinite alternate;
    }

    @keyframes bgShift {
      from { opacity: 1; }
      to { opacity: .75; }
    }

    .wrap { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; }
    .app-shell { display: flex; flex-direction: column; flex: 1; }

    .app-header {
      position: sticky;
      top: 0;
      z-index: 100;
      height: 64px;
      display: flex;
      align-items: center;
      padding: 0 clamp(14px, 3vw, 32px);
      background: rgba(240,237,248,.75);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border-soft);
    }

    .app-header-left {
      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
    }

    .brand-text { display: flex; flex-direction: column; gap: 1px; }

    .brand-name {
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -.03em;
      line-height: 1;
    }

    .brand-tag {
      font-size: 10px;
      font-weight: 700;
      color: var(--text-soft);
      letter-spacing: .06em;
      text-transform: uppercase;
    }

    .user-badge {
      margin-left: auto;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: 999px;
      background: var(--glass);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      font-size: 11px;
      font-weight: 600;
      color: var(--text-soft);
      white-space: nowrap;
    }

    .user-badge span { font-weight: 800; color: var(--text); }

    .layout {
      display: grid;
      grid-template-columns: 1fr 420px;
      gap: 20px;
      padding: clamp(16px, 2.5vw, 28px) clamp(14px, 3vw, 32px);
      flex: 1;
      align-items: start;
    }

    @media (max-width: 980px) {
      .layout { grid-template-columns: 1fr; }
    }

    .card {
      background: var(--glass-strong);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      overflow: hidden;
    }

    .preview-card {
      display: flex;
      flex-direction: column;
      position: sticky;
      top: 80px;
      animation: fadeUp .55s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .preview-stage-wrap { padding: 16px; }

    .preview-stage {
      width: 100%;
      border-radius: var(--radius-lg);
      overflow: hidden;
      background: linear-gradient(160deg, var(--pink-soft), var(--violet-soft));
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.3);
    }

    .preview-stage canvas {
      width: 100%;
      height: auto;
      display: block;
      touch-action: none;
      cursor: grab;
    }

    .right-col { display: flex; flex-direction: column; gap: 14px; }
    .stack { display: flex; flex-direction: column; gap: 14px; }

    #editPanel { display: flex; flex-direction: column; gap: 14px; }
    #editPanel.u-hidden { display: none !important; }

    #resultPanel { display: flex; flex-direction: column; gap: 14px; }
    #resultPanel.u-hidden { display: none !important; }

    .result-actions-top {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
    }

    .btn-result {
      height: var(--btn-h);
      border-radius: var(--radius-md);
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: var(--btn-font);
      font-weight: 700;
      cursor: pointer;
      transition: transform .18s ease, box-shadow .18s ease;
      letter-spacing: .01em;
      background: var(--glass);
      border: 1px solid var(--border);
      color: var(--text);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .btn-result:hover { transform: translateY(-1px); box-shadow: var(--shadow-soft); }

    .btn-result.primary {
      background: linear-gradient(135deg, var(--pink), var(--violet));
      color: #fff;
      box-shadow: 0 8px 20px rgba(196,38,133,.28);
      border: none;
    }

    .ia-content-card {
      background: var(--glass-strong);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      overflow: hidden;
    }

    .ia-content-header {
      padding: 16px 20px 12px;
      border-bottom: 1px solid var(--border-soft);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .ia-content-header h3 {
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -.02em;
    }

    .ia-content-header .badge-ia {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--violet);
      background: var(--violet-soft);
      padding: 3px 9px;
      border-radius: 999px;
    }

    .ia-copy-block {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border-soft);
    }

    .ia-copy-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--text-soft);
      margin-bottom: 10px;
    }

    .ia-copy-text {
      font-size: 13px;
      line-height: 1.65;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-word;
      margin-bottom: 10px;
    }

    .ia-hashtags-text {
      font-size: 12px;
      line-height: 1.8;
      color: var(--violet);
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      white-space: pre-wrap;
      word-break: break-word;
      margin-bottom: 12px;
    }

    .ia-tip-text {
      font-size: 12px;
      line-height: 1.6;
      color: var(--text-soft);
      padding: 8px 12px;
      background: var(--pink-soft);
      border-radius: var(--radius-md);
      border-left: 3px solid var(--pink);
      margin-bottom: 10px;
    }

    .btn-copy-all {
      width: 100%;
      height: 40px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border-soft);
      background: var(--glass);
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 700;
      color: var(--text);
      cursor: pointer;
      transition: background .18s, transform .18s;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      letter-spacing: .01em;
    }

    .btn-copy-all:hover { background: rgba(255,255,255,.92); transform: translateY(-1px); }
    .btn-copy-all.copied { color: #257a63; }

    .ia-schedule-block {
      padding: 14px 20px 16px;
    }

    .ia-schedule-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--text-soft);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .ia-schedule-label::before {
      content: "";
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--pink);
      flex-shrink: 0;
    }

    .ia-schedule-text {
      font-size: 13px;
      line-height: 1.6;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .ia-loading {
      padding: 28px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .ia-loading-spinner {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2.5px solid rgba(196,38,133,.2);
      border-top-color: var(--pink);
      animation: spin .7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .ia-loading p {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-soft);
    }

    .preview-actions-top {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
    }

    .quick-action {
      display: flex;
      align-items: center;
      justify-content: center;
      height: var(--btn-h);
      border-radius: var(--radius-md);
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: transform .18s ease, box-shadow .18s ease;
      text-align: center;
      padding: 0 10px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      letter-spacing: .01em;
      font-family: 'DM Sans', sans-serif;
    }

    .quick-action:not(.secondary) {
      background: linear-gradient(135deg, var(--pink), var(--violet));
      color: #fff;
      box-shadow: 0 8px 20px rgba(196,38,133,.28);
    }

    .quick-action.secondary {
      background: var(--glass);
      border: 1px solid var(--border);
      color: var(--text);
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .btn-ia {
      width: 100%;
      height: var(--btn-h-main);
      border-radius: var(--radius-md);
      border: none;
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 800;
      letter-spacing: -.01em;
      color: #fff;
      background: linear-gradient(135deg, var(--pink) 0%, var(--violet) 100%);
      box-shadow: 0 10px 28px rgba(196,38,133,.34);
      cursor: pointer;
      transition: transform .2s ease, box-shadow .2s ease;
      position: relative;
      overflow: hidden;
    }

    .btn-ia:hover { transform: translateY(-2px); box-shadow: 0 16px 36px rgba(196,38,133,.40); }
    .btn-ia:disabled { opacity: .7; cursor: wait; }

    .form-card {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .section-head { display: flex; flex-direction: column; gap: 3px; }

    .section-head h2 {
      font-family: 'Syne', sans-serif;
      font-size: 16px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -.02em;
    }

    .section-head p { font-size: 12px; font-weight: 500; color: var(--text-soft); }

    .details-card {
      border-radius: var(--radius-md);
      background: rgba(255,255,255,.55);
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .details-card summary {
      padding: 13px 16px;
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      cursor: pointer;
      list-style: none;
      display: flex;
      align-items: center;
      justify-content: space-between;
      user-select: none;
      transition: background .18s;
    }

    .details-card summary::after {
      content: "›";
      font-size: 18px;
      font-weight: 400;
      color: var(--text-soft);
      transition: transform .22s ease;
    }

    .details-card[open] summary::after { transform: rotate(90deg); }

    .details-body {
      padding: 14px 16px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      border-top: 1px solid var(--border-soft);
    }

    .field { display: flex; flex-direction: column; gap: 5px; }

    .field label {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-soft);
      text-transform: uppercase;
      letter-spacing: .07em;
    }

    .field input,
    .field textarea {
      width: 100%;
      padding: 10px 13px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border-soft);
      background: rgba(255,255,255,.7);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      outline: none;
      transition: border-color .18s, box-shadow .18s;
      resize: none;
    }

    .field input:focus,
    .field textarea:focus,
    .piper-api-input:focus,
    .piper-input:focus,
    .piper-textarea:focus {
      border-color: rgba(196,38,133,.35);
      box-shadow: 0 0 0 3px rgba(196,38,133,.10);
    }

    .field textarea { min-height: 90px; }
    .two { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    /* PANEL EDITOR */
    .piper-card {
      border-radius: var(--radius-xl);
      overflow: hidden;
      background: var(--glass-strong);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .piper-header {
      padding: 16px 20px 12px;
      border-bottom: 1px solid var(--border-soft);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      background: transparent;
    }

    .piper-title-wrap { display: flex; flex-direction: column; gap: 3px; }

    .piper-title {
      font-family: 'Syne', sans-serif;
      font-size: 16px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -.02em;
      line-height: 1.1;
    }

    .piper-sub {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-soft);
      letter-spacing: .06em;
      text-transform: uppercase;
      font-family: 'DM Sans', sans-serif;
    }

    .openai-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--violet-soft);
      border: 1px solid rgba(54,42,111,.12);
      border-radius: 999px;
      padding: 4px 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 10px;
      font-weight: 700;
      color: var(--violet);
      letter-spacing: .08em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .piper-body {
      padding: 18px 20px 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      background: transparent;
    }

    .piper-label {
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .07em;
      color: var(--text-soft);
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .piper-api-input,
    .piper-input,
    .piper-textarea {
      width: 100%;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      background: rgba(255,255,255,.7);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-md);
      padding: 10px 13px;
      color: var(--text);
      outline: none;
    }

    .piper-textarea {
      min-height: 110px;
      resize: vertical;
      line-height: 1.6;
    }

    .chips-row { display: flex; flex-wrap: wrap; gap: 8px; }

    .chip {
      font-size: 12px;
      font-weight: 700;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid var(--border-soft);
      background: rgba(255,255,255,.72);
      color: var(--text);
      cursor: pointer;
      transition: all .15s;
      font-family: 'DM Sans', sans-serif;
      user-select: none;
    }

    .chip.active {
      background: linear-gradient(135deg, var(--pink), var(--violet));
      color: #fff;
      border-color: transparent;
      box-shadow: 0 8px 20px rgba(196,38,133,.20);
    }

    .tone-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }

    .tone-btn {
      padding: 10px 8px;
      border-radius: 14px;
      border: 1px solid var(--border-soft);
      background: rgba(255,255,255,.72);
      font-size: 12px;
      font-weight: 700;
      color: var(--text);
      cursor: pointer;
      text-align: center;
      transition: all .15s;
      font-family: 'DM Sans', sans-serif;
    }

    .tone-btn.active {
      background: linear-gradient(135deg, var(--pink), var(--violet));
      color: #fff;
      border-color: transparent;
      box-shadow: 0 8px 20px rgba(196,38,133,.20);
    }

    .tone-emoji {
      display: block;
      font-size: 16px;
      margin-bottom: 3px;
    }

    .error-box {
      background: rgba(255, 238, 241, .95);
      border: 1px solid rgba(184,50,50,0.18);
      border-radius: 14px;
      padding: 1rem;
      font-size: 13px;
      color: #b83232;
      line-height: 1.6;
    }

    .u-hidden { display: none !important; }

    @media (max-width: 600px) {
      .preview-actions-top { grid-template-columns: 1fr 1fr; }
      .preview-actions-top .quick-action:last-child { grid-column: 1 / -1; }
      .two { grid-template-columns: 1fr; }
      .tone-grid { grid-template-columns: repeat(2, 1fr); }
      .result-actions-top .btn-result:last-child { grid-column: 1 / -1; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="app-shell">

      <header class="app-header">
        <div class="app-header-left">
          <div class="brand-text">
            <div class="brand-name">By Weeb</div>
            <div class="brand-tag">Editor</div>
          </div>
          <div class="user-badge">Usuario: <span id="userIdBox">---</span></div>
        </div>
      </header>

      <section class="layout">

        <div class="card preview-card">
          <div class="preview-stage-wrap">
            <div class="preview-stage">
              <canvas id="flyerCanvas" width="1080" height="1350"></canvas>
            </div>
          </div>
        </div>

        <div class="right-col">

          <div id="editPanel">
            <div class="preview-actions-top">
              <label for="mainImageGallery" class="quick-action">Elegir foto</label>
              <label for="mainImageCamera" class="quick-action secondary">Sacar foto</label>
              <label for="logoImage" class="quick-action secondary">Subir logo</label>
            </div>

            <button class="btn-ia" id="btnGenerar" type="button">Generar flyer + contenido</button>

            <div class="card form-card">
              <div class="section-head">
                <h2>Datos del flyer</h2>
                <p>Imagen, logo, título y contacto</p>
              </div>

              <input type="file" id="mainImageGallery" accept="image/*" hidden>
              <input type="file" id="mainImageCamera" accept="image/*" capture="environment" hidden>
              <input type="file" id="logoImage" accept="image/*" hidden>

              <details class="details-card" open>
                <summary>Título · Descripción · Contacto</summary>
                <div class="details-body">
                  <div class="field">
                    <label for="titulo">Título</label>
                    <input type="text" id="titulo" placeholder="Ej: Atención veterinaria con amor">
                  </div>
                  <div class="field">
                    <label for="texto">Texto flyer</label>
                    <textarea id="texto" placeholder="Escribí un mensaje corto para el flyer..."></textarea>
                  </div>
                  <div class="two">
                    <div class="field">
                      <label for="instagram">Instagram</label>
                      <input type="text" id="instagram" value="@drabruzera">
                    </div>
                    <div class="field">
                      <label for="whatsapp">WhatsApp</label>
                      <input type="tel" id="whatsapp" value="3435303848">
                    </div>
                  </div>
                  <div class="two">
                    <div class="field">
                      <label for="web">Web</label>
                      <input type="text" id="web" value="www.bruzera.turnox.pro">
                    </div>
                    <div class="field">
                      <label for="ubicacion">Ubicación</label>
                      <input type="text" id="ubicacion" value="José Venturino 1239">
                    </div>
                  </div>
                </div>
              </details>
            </div>

            <div class="piper-card">
              <div class="piper-header">
                <div class="piper-title-wrap">
                  <div class="piper-title">Editor</div>
                  <div class="piper-sub">configuración de contenido</div>
                </div>
                <span class="openai-badge">Texto</span>
              </div>

              <div class="piper-body">
                

                <div class="field">
                  <label class="piper-label" for="videoDesc">Descripción del contenido</label>
                  <textarea class="piper-textarea" id="videoDesc" placeholder="Describí la imagen, el momento, la mascota o la situación para generar el texto."></textarea>
                </div>

                <div class="field">
                  <div class="piper-label">Formato</div>
                  <div class="chips-row">
                    <div class="chip" data-type="reel">Reel</div>
                    <div class="chip" data-type="carrusel">Carrusel</div>
                    <div class="chip" data-type="historia">Historia</div>
                    <div class="chip active" data-type="post">Post estático</div>
                  </div>
                </div>

                <div class="field">
                  <div class="piper-label">Tono</div>
                  <div class="tone-grid">
                    <button class="tone-btn" type="button" data-tone="cercano"><span class="tone-emoji">🤝</span>Cercano</button>
                    <button class="tone-btn" type="button" data-tone="educativo"><span class="tone-emoji">🎓</span>Educativo</button>
                    <button class="tone-btn" type="button" data-tone="divertido"><span class="tone-emoji">😄</span>Claro</button>
                    <button class="tone-btn active" type="button" data-tone="profesional"><span class="tone-emoji">🏥</span>Profesional</button>
