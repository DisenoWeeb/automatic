<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Generador básico IA</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 0;
      color: #222;
    }

    .wrap {
      max-width: 760px;
      margin: 40px auto;
      padding: 20px;
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 10px 25px rgba(0,0,0,.08);
    }

    h1 {
      margin-top: 0;
      font-size: 28px;
    }

    textarea {
      width: 100%;
      min-height: 120px;
      border: 1px solid #ccc;
      border-radius: 10px;
      padding: 14px;
      font-size: 16px;
      box-sizing: border-box;
      resize: vertical;
    }

    button {
      margin-top: 14px;
      background: #0d6efd;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 12px 20px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      opacity: .95;
    }

    #loading {
      margin-top: 18px;
      display: none;
      color: #0d6efd;
      font-weight: bold;
    }

    #error {
      margin-top: 18px;
      display: none;
      background: #ffe5e5;
      color: #b00020;
      padding: 12px;
      border-radius: 10px;
    }

    #resultado {
      display: none;
      margin-top: 24px;
    }

    #imgFinal {
      width: 100%;
      max-width: 100%;
      border-radius: 12px;
      display: none;
      border: 1px solid #ddd;
    }

    #promptUsado {
      margin-top: 12px;
      font-size: 14px;
      color: #555;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Generador básico con IA</h1>

    <textarea
      id="prompt"
      placeholder="Ejemplo: un perro veterinario feliz en una clínica moderna, estilo publicitario profesional">
    </textarea>

    <button id="btnGenerar">Generar imagen</button>

    <div id="loading">Generando imagen, esperá un momento...</div>
    <div id="error"></div>

    <div id="resultado">
      <img id="imgFinal" alt="Imagen generada" />
      <div id="promptUsado"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
