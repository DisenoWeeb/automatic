<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dra. Bruzera - Generador de Flyers</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>Dra. Bruzera</h1>
            <p>Generador de Flyers Profesionales</p>
        </header>

        <main class="main-content">
            <!-- Formulario -->
            <section class="form-section">
                <div class="input-group">
                    <label for="mainImage">Imagen Principal *</label>
                    <input type="file" id="mainImage" accept="image/*" required>
                    <div class="preview-container" id="mainImagePreview">
                        <span class="preview-placeholder">Vista previa de imagen principal</span>
                    </div>
                </div>

                <div class="input-group">
                    <label for="logoImage">Logo (opcional)</label>
                    <input type="file" id="logoImage" accept="image/*">
                    <div class="preview-container" id="logoPreview">
                        <span class="preview-placeholder">Vista previa del logo</span>
                    </div>
                </div>

                <div class="input-group">
                    <label for="flyerText">Texto del Flyer * (máx. 6 palabras)</label>
                    <input type="text" id="flyerText" maxlength="40" placeholder="Ej: Cuidamos a tu mejor amigo" required>
                    <span class="word-count" id="wordCount">0 palabras</span>
                </div>

                <button id="generateBtn" class="btn-generate" disabled>
                    Generar Flyer
                </button>
            </section>

            <!-- Loader -->
            <div id="loader" class="loader hidden">
                <div class="spinner"></div>
                <p>Procesando imagen...</p>
                <p class="loader-sub">Esto puede tomar unos segundos</p>
            </div>

            <!-- Resultado -->
            <section id="resultSection" class="result-section hidden">
                
                <h2>¡Flyer Generado!</h2>
                <div id="iaStatus" class="ia-status hidden"></div>
                <div class="canvas-container">
                    <canvas id="flyerCanvas" width="1080" height="1350"></canvas>
                </div>
                <div class="result-actions">
                    <button id="downloadBtn" class="btn-download">Descargar Flyer</button>
                    <button id="newFlyerBtn" class="btn-new">Crear Nuevo</button>
                </div>
            </section>
        </main>

        <footer class="footer">
            <p>&copy; 2024 Dra. Bruzera - Veterinaria</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
