<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Modelos de Flyers</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body class="app-body home-body">

  <div class="page-shell">
    <header class="topbar topbar-home">
      <div class="brand-block">
        <div class="brand-kicker">Generador automático</div>
        <h1 class="page-title">Elegí un modelo</h1>
        <p class="page-subtitle">
          Plantillas listas para usar. Después podés llegar a 20 o más sin tocar la estructura visual.
        </p>
      </div>
    </header>

    <main class="home-main">
      <section class="models-grid" id="modelsGrid"></section>
    </main>
  </div>

  <script>
    const FLYERS = [
      {
        id: 1,
        name: "Flyer 1",
        desc: "Clásico con foto, logo, texto y botón Aplicar IA.",
        file: "flyer1.html",
        preview: "img/previews/flyer1-preview.png",
        badge: "IA"
      },
      {
        id: 2,
        name: "Flyer 2",
        desc: "Modelo alternativo, más visual y pensado para redes.",
        file: "flyer2.html",
        preview: "img/previews/flyer2-preview.png",
        badge: "IA"
      }
      // después seguís:
      // { id: 3, name: "Flyer 3", desc: "...", file: "flyer3.html", preview: "img/previews/flyer3-preview.png", badge: "Nuevo" }
    ];

    const grid = document.getElementById("modelsGrid");

    function renderModels() {
      grid.innerHTML = FLYERS.map(item => `
        <article class="model-card" onclick="window.location.href='${item.file}'">
          <div class="model-preview-wrap">
            <img class="model-preview" src="${item.preview}" alt="${item.name}">
            ${item.badge ? `<span class="model-badge">${item.badge}</span>` : ""}
          </div>

          <div class="model-card-body">
            <h2 class="model-title">${item.name}</h2>
            <p class="model-desc">${item.desc}</p>

            <div class="model-card-footer">
              <span class="model-open">Abrir modelo</span>
            </div>
          </div>
        </article>
      `).join("");
    }

    renderModels();
  </script>
</body>
</html>
