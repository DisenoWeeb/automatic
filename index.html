<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flyers IA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">

  <style>
    .flyers-showcase {
      width: min(1600px, calc(100% - 20px));
      margin: 18px auto 28px;
    }

    .flyers-strip {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
      align-items: start;
    }

    .flyer-frame {
      width: 100%;
      aspect-ratio: 9 / 16;
      overflow: hidden;
      border-radius: 24px;
      background: transparent;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
    }

    .flyer-frame iframe {
      width: 1080px;
      height: 1350px;
      border: 0;
      display: block;
      pointer-events: none;
      transform-origin: top left;
      transform: scale(0.255);
    }

    @media (max-width: 1100px) {
      .flyers-strip {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .flyer-frame iframe {
        transform: scale(0.245);
      }
    }

    @media (max-width: 640px) {
      .flyers-showcase {
        width: 100%;
        margin: 12px 0 20px;
        padding-left: 10px;
      }

      .flyers-strip {
        display: flex;
        gap: 12px;
        overflow-x: auto;
        overflow-y: hidden;
        padding-right: 10px;
        scroll-snap-type: x proximity;
        -webkit-overflow-scrolling: touch;
      }

      .flyers-strip::-webkit-scrollbar {
        height: 8px;
      }

      .flyers-strip::-webkit-scrollbar-thumb {
        background: rgba(84, 63, 140, 0.28);
        border-radius: 999px;
      }

      .flyer-frame {
        flex: 0 0 78vw;
        max-width: 340px;
        min-width: 260px;
        border-radius: 20px;
        scroll-snap-align: start;
      }

      .flyer-frame iframe {
        transform: scale(0.215);
      }
    }
  </style>
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <button class="menu-btn" aria-label="Abrir menú" type="button">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <div class="brand">
        <div class="brand-title">Flyers IA</div>
        <div class="brand-subtitle">1 crédito por imagen · 4 créditos por video</div>
      </div>

      <div class="header-right">
        <a href="#" class="top-chip">Historial</a>
      </div>
    </div>
  </header>

  <main class="flyers-showcase">
    <section class="flyers-strip" id="flyersStrip"></section>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-brand">Flyers IA</div>
      <div class="footer-copy">1 crédito por imagen · 4 créditos por video</div>
    </div>
  </footer>

  <script>
    const FLYERS = [
      { file: "flyer1.html?preview=1", name: "Flyer 1" },
      { file: "flyer2.html?preview=1", name: "Flyer 2" },
      { file: "flyer3.html?preview=1", name: "Flyer 3" },
      { file: "flyer4.html?preview=1", name: "Flyer 4" },
      { file: "flyer5.html?preview=1", name: "Flyer 5" },
      { file: "flyer6.html?preview=1", name: "Flyer 6" }
    ];

    const strip = document.getElementById("flyersStrip");

    strip.innerHTML = FLYERS.map(item => `
      <div class="flyer-frame" aria-label="${item.name}">
        <iframe
          src="${item.file}"
          title="${item.name}"
          loading="lazy"
          scrolling="no"
          tabindex="-1">
        </iframe>
      </div>
    `).join("");
  </script>
</body>
</html>
