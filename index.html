<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Generador de Flyers</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; }

    body {
      background: #020617;
      color: #fff;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
      font-weight: 800;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
    }

    .card {
      background: linear-gradient(145deg, #0f172a, #020617);
      border-radius: 18px;
      padding: 18px;
      cursor: pointer;
      transition: 0.25s;
      border: 1px solid rgba(255,255,255,0.06);
      position: relative;
      overflow: hidden;
    }

    .card:hover {
      transform: translateY(-6px) scale(1.02);
      box-shadow: 0 20px 40px rgba(0,0,0,0.6);
    }

    .preview {
      width: 100%;
      height: 320px;
      border-radius: 14px;
      background: #111;
      margin-bottom: 15px;
      overflow: hidden;
    }

    .preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .title {
      font-size: 16px;
      font-weight: 700;
    }

    .desc {
      font-size: 13px;
      color: #aaa;
    }

    .badge {
      position: absolute;
      top: 12px;
      right: 12px;
      background: #9333ea;
      font-size: 11px;
      padding: 4px 8px;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<h1>Elegí un modelo</h1>

<div class="grid" id="grid"></div>

<script>
  const FLYERS = [
    {
      id: 1,
      name: "Flyer Clásico",
      desc: "Imagen + texto + logo + IA",
      file: "flyer1.html",
      preview: "", // después le metemos imagen real
      ia: true
    },
    {
      id: 2,
      name: "Flyer Moderno",
      desc: "Diseño visual alternativo",
      file: "flyer2.html",
      preview: "",
      ia: false
    },

    // 🔥 ESCALA ACA
    {
      id: 3,
      name: "Promo Impacto",
      desc: "Texto grande + CTA fuerte",
      file: "flyer3.html",
      preview: ""
    },
    {
      id: 4,
      name: "Minimal Clean",
      desc: "Ultra simple, elegante",
      file: "flyer4.html",
      preview: ""
    }

    // 👉 seguís hasta 20 sin tocar HTML
  ];

  const grid = document.getElementById("grid");

  FLYERS.forEach(f => {
    const card = document.createElement("div");
    card.className = "card";
    card.onclick = () => goTo(f.file);

    card.innerHTML = `
      ${f.ia ? '<div class="badge">IA</div>' : ''}

      <div class="preview">
        ${f.preview 
          ? `<img src="${f.preview}">` 
          : `<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#666;">Preview</div>`
        }
      </div>

      <div class="title">${f.name}</div>
      <div class="desc">${f.desc}</div>
    `;

    grid.appendChild(card);
  });

  function goTo(page) {
    window.location.href = page;
  }
</script>

</body>
</html>
