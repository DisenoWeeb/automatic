<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flyers IA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">

  <style>
    
    .flyers-strip {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 16px;
  align-items: start;
}

.flyer-frame {
  width: 100%;
  aspect-ratio: 4 / 5;
  overflow: hidden;
  position: relative;
  border-radius: 22px;
  border: 1px solid rgba(255,255,255,.18);
  background: rgba(255,255,255,.04);
}

.flyer-frame iframe {
  width: 100%;
  height: 100%;
  border: 0;
  display: block;
  pointer-events: none;
}
   @media (max-width: 640px) {
  .flyers-strip {
    display: flex;
    gap: 12px;
    overflow-x: auto;
    overflow-y: hidden;
    padding-right: 10px;
    -webkit-overflow-scrolling: touch;
  }

  .flyer-frame {
    flex: 0 0 82vw;
    max-width: 360px;
    min-width: 260px;
  }
}
  </style>
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <button class="menu-btn" aria-label="Abrir menú" type="button">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <div class="brand">
        <div class="brand-title">Flyers IA</div>
        <div class="brand-subtitle">1 crédito por imagen · 4 créditos por video</div>
      </div>

      <div class="header-right">
        <a href="#" class="top-chip">Historial</a>
      </div>
    </div>
  </header>

  <main class="flyers-showcase">
    <section class="flyers-strip" id="flyersStrip"></section>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-brand">Flyers IA</div>
      <div class="footer-copy">1 crédito por imagen · 4 créditos por video</div>
    </div>
  </footer>

  <script>
    const FLYERS = [
      { file: "flyer1.html", name: "Flyer 1" },
      { file: "flyer2.html", name: "Flyer 2" }
    ];

    const strip = document.getElementById("flyersStrip");

    strip.innerHTML = FLYERS.map(item => `
      <div class="flyer-frame">
        <iframe
          src="${item.file}"
          title="${item.name}"
          loading="lazy"
          scrolling="no"
          tabindex="-1"
          data-flyer
        ></iframe>
      </div>
    `).join("");

    function isolatePreviewCard(iframe) {
      try {
        const doc = iframe.contentDocument || iframe.contentWindow.document;
        if (!doc) return;

        const previewCard = doc.querySelector('.card.preview-card');
        if (!previewCard) return;

        const style = doc.createElement('style');
        style.textContent = `
          html, body {
            margin: 0 !important;
            padding: 0 !important;
            background: transparent !important;
            overflow: hidden !important;
            width: 1080px !important;
            height: 1350px !important;
            min-width: 1080px !important;
            min-height: 1350px !important;
          }

          body > * {
            display: none !important;
          }

          .card.preview-card {
            display: block !important;
            margin: 0 !important;
            padding: 0 !important;
            width: 1080px !important;
            max-width: 1080px !important;
            min-width: 1080px !important;
            background: transparent !important;
            border: 0 !important;
            border-radius: 0 !important;
            box-shadow: none !important;
          }

          .card.preview-card .preview-header {
            display: none !important;
          }

          .card.preview-card .preview-stage-wrap,
          .card.preview-card .preview-stage {
            margin: 0 !important;
            padding: 0 !important;
            width: 1080px !important;
            max-width: 1080px !important;
            min-width: 1080px !important;
            background: transparent !important;
          }

          .card.preview-card canvas,
          .card.preview-card #flyerCanvas {
            display: block !important;
            width: 1080px !important;
            height: 1350px !important;
            margin: 0 !important;
          }
        `;
        doc.head.appendChild(style);

        doc.body.innerHTML = '';
        doc.body.appendChild(previewCard);
      } catch (err) {
        console.warn('No se pudo aislar preview del iframe:', err);
      }
    }

    document.querySelectorAll('iframe[data-flyer]').forEach(iframe => {
      iframe.addEventListener('load', () => isolatePreviewCard(iframe));
    });
  </script>
</body>
</html>
